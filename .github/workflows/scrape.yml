name: Hourly Wind Scraper

on:
  schedule:
    - cron: '0 * * * *' # Executes at the start of every hour
  workflow_dispatch: # Allows you to run it manually for testing

jobs:
  scrape_and_update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install Dependencies
        run: |
          pip install gspread google-auth requests pytz

      - name: Run Scraper
        env:
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
        run: python main.py
